# Wafer Defect Classification Configuration

# Model
model:
  backbone: "dinov3_vitb16"  # vitb16, vitl16
  pretrained_path: "weights/dinov3_vitl16_pretrain_lvd1689m-8aa4cbdd.pth"
  img_size: 224
  num_views: 3

# Data
data:
  num_classes: 30  # defect classes (excluding Nuisance)
  nuisance_ratio: 0.3  # ratio of nuisance samples
  train_split: 0.8
  batch_size: 8
  num_workers: 4

# Training
train:
  epochs: 50
  lr: 1e-4
  weight_decay: 0.01
  gate_weight: 1.0
  fine_weight: 0.5
  metric_weight: 0.1

# Gate (Nuisance vs Defect)
gate:
  defect_weight: 3.0  # higher penalty for missing defects

# Anomaly detection
anomaly:
  threshold: 0.5  # distance threshold for unknown detection
